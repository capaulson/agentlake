---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-server-config
  labels:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: agentlake
data:
  AGENTLAKE_API_URL: "http://api:8000"
  MCP_SERVER_PORT: "8002"
  MCP_SERVER_TRANSPORT: "sse"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-server-secret
  labels:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: agentlake
type: Opaque
stringData:
  AGENTLAKE_API_KEY: "CHANGE-ME"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  labels:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: agentlake
spec:
  ports:
    - port: 8002
      targetPort: 8002
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: mcp-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  labels:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: agentlake
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-server
        app.kubernetes.io/component: mcp
        app.kubernetes.io/part-of: agentlake
    spec:
      containers:
        - name: mcp-server
          image: agentlake/api:latest
          command:
            - python
            - -m
            - agentlake.mcp.server
            - --transport
            - sse
            - --port
            - "8002"
          ports:
            - containerPort: 8002
              name: http
          envFrom:
            - configMapRef:
                name: mcp-server-config
            - secretRef:
                name: mcp-server-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
