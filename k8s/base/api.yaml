---
# ConfigMap: non-secret configuration for the API server
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: agentlake
data:
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "agentlake-vault"
  MINIO_SECURE: "false"
  LLM_GATEWAY_URL: "http://llm-gateway:8001"
  REDIS_URL: "redis://redis:6379/0"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  API_CORS_ORIGINS: "https://agentlake.local"
---
# Secret: sensitive API config (override in overlays)
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: agentlake
type: Opaque
stringData:
  JWT_SECRET: "CHANGE-ME-IN-PRODUCTION"
  API_KEY_SALT: "CHANGE-ME-IN-PRODUCTION"
  LLM_GATEWAY_SERVICE_TOKEN: "change-me-in-production"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: agentlake
spec:
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: agentlake
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/component: api-server
        app.kubernetes.io/part-of: agentlake
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: agentlake/api:latest
          command:
            - uvicorn
            - agentlake.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --workers
            - "2"
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
            - secretRef:
                name: postgres-secret
            - secretRef:
                name: minio-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 5
            failureThreshold: 12
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: agentlake
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
