---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ui-nginx-config
  labels:
    app.kubernetes.io/name: ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: agentlake
data:
  default.conf: |
    server {
        listen 3000;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # gzip static assets
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
        gzip_min_length 256;

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Health check endpoint
        location /healthz {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  labels:
    app.kubernetes.io/name: ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: agentlake
spec:
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  labels:
    app.kubernetes.io/name: ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: agentlake
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ui
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: agentlake
    spec:
      containers:
        - name: ui
          image: agentlake/ui:latest
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: ui-nginx-config
